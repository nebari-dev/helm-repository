name: Ensure Quay.io Chart Repositories
description: |
  Ensures that quay.io OCI repositories under <namespace>/<repo-prefix>/
  exist and are public for every packaged Helm chart in the given directory.

  Only repositories scoped to the configured repo-prefix (default: "charts")
  are managed — this action will never modify repositories outside that path.

  - Missing repos are created as public.
  - Private repos within the prefix are changed to public.
  - Public repos are left untouched.
  - When push-user is set, that account is granted write permission on any
    managed repo where it has no permission entry yet (API-created repos
    grant the push robot nothing, so its first push would otherwise fail
    with 401).

  Requires a Quay OAuth application token (not robot account credentials)
  because the Quay REST API enforces CSRF validation on mutating requests.

inputs:
  token:
    description: |
      Quay.io OAuth application token with repo:create and repo:admin scopes.
      repo:create is needed to create new repositories, repo:admin to
      change visibility on existing ones.
      Create under: Quay org settings → Applications → Generate Token.
    required: true

  namespace:
    description: Quay.io organisation name.
    required: true
    default: nebari

  repo-prefix:
    description: |
      Repository path prefix. Charts are stored at
      <namespace>/<repo-prefix>/<chart-name> on quay.io.
    required: true
    default: charts

  packaged-dir:
    description: |
      Path to the directory containing packaged .tgz chart archives.
      Each .tgz is inspected with `helm show chart` to extract the
      chart name.
    required: true

  push-user:
    description: |
      Quay.io username that pushes charts (typically a robot account,
      e.g. "nebari+helm_bot"). When set, it is granted write permission
      on each managed repo that has no permission entry for it yet.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Ensure repositories exist and are public
      shell: bash
      env:
        QUAY_API_TOKEN: ${{ inputs.token }}
        QUAY_NAMESPACE: ${{ inputs.namespace }}
        QUAY_REPO_PREFIX: ${{ inputs.repo-prefix }}
        QUAY_PUSH_USER: ${{ inputs.push-user }}
      run: bash ${{ github.action_path }}/ensure.sh "${{ inputs.packaged-dir }}"
