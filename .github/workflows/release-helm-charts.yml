name: Release Helm Charts

concurrency: release-helm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (source)
        uses: actions/checkout@v4
        with:
          path: src
          ref: main
          fetch-depth: 0

      - name: Checkout gh-pages branch (deploy target)
        uses: actions/checkout@v4
        with:
          path: dest
          ref: gh-pages
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.4'

      # Add any non-OCI dependency repositories referenced by charts.
      - name: Add Helm dependency repositories
        working-directory: src
        run: |
          i=0
          for chart_dir in charts/*/; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            for repo_url in $(grep 'repository:' "${chart_dir}Chart.yaml" | awk '{print $2}' | tr -d '"' | tr -d "'" | grep '^https://'); do
              echo "Adding repo dep-${i} -> ${repo_url}"
              helm repo add "dep-${i}" "${repo_url}" 2>/dev/null || true
              i=$((i + 1))
            done
          done
          helm repo update 2>/dev/null || true

      # Package every chart source directory found under charts/.
      # Packaged .tgz files land in src/packaged/ (a temporary staging area).
      - name: Package charts
        working-directory: src
        run: |
          mkdir -p packaged
          for chart_dir in charts/*/; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            echo "Packaging ${chart_dir}..."
            if [ -f "${chart_dir}Chart.lock" ] || grep -q '^dependencies:' "${chart_dir}Chart.yaml"; then
              helm dependency build "${chart_dir}"
            fi
            helm package "${chart_dir}" --destination packaged/
          done
          echo "Packaged charts:"
          ls packaged/ || echo "(none)"

      # Log in to the quay.io OCI registry using the Nebari bot robot account
      # and push every packaged chart. Charts become installable via:
      #   helm install my-release oci://quay.io/nebari/charts/<chart-name> --version <version>
      - name: Log in to quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "${QUAY_PASSWORD}" | helm registry login quay.io \
            --username "${QUAY_USERNAME}" \
            --password-stdin

      # Ensure each chart's OCI repository exists as public on quay.io
      # BEFORE pushing. This avoids two problems:
      #   1. Quay creates repos as private on first push, blocking
      #      ArgoCD and unauthenticated clients.
      #   2. Helm >= 3.18 (oras-go v2) fails with 401 on the pre-push
      #      Exists check when the repo doesn't exist yet.
      - name: Ensure chart repositories exist and are public
        uses: ./.github/actions/ensure-quay-repos
        with:
          token: ${{ secrets.QUAY_API_TOKEN }}
          packaged-dir: src/packaged

      - name: Push charts to quay.io OCI registry
        working-directory: src
        run: |
          for tgz in packaged/*.tgz; do
            [ -f "$tgz" ] || continue
            echo "Pushing ${tgz} → oci://quay.io/nebari/charts ..."
            helm push "$tgz" oci://quay.io/nebari/charts
          done

      - name: Log out of quay.io
        if: always()
        run: helm registry logout quay.io || true

      # Merge the new packages into the existing gh-pages index so that the
      # original "created" timestamps of previously released charts are kept.
      - name: Update Helm index
        working-directory: src
        run: |
          mkdir -p ../dest/helm
          # Rebuild the index, merging with the existing one on gh-pages
          helm repo index ./packaged \
            --merge ../dest/index.yaml \
            --url https://raw.githubusercontent.com/nebari-dev/helm-repository/gh-pages/helm/
          # Copy new archives into gh-pages helm/ (skip already-present files)
          cp -pn ./packaged/*.tgz ../dest/helm/ 2>/dev/null || true
          # Update the root index.yaml on gh-pages
          cp -p ./packaged/index.yaml ../dest/index.yaml

      # Commit and push only to gh-pages — main is never modified by this workflow.
      # Note: index.html is managed directly on gh-pages (not copied from main).
      - name: Commit and push to gh-pages
        working-directory: dest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: release charts from main@$GITHUB_SHA"
          git push
