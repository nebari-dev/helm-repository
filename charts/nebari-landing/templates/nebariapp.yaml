{{- if .Values.nebariApp.enabled }}
{{- $host := required "httpRoute.hostname is required when nebariApp.enabled=true" .Values.httpRoute.hostname }}
# ── NebariApp: frontend ────────────────────────────────────────────────────────
# Routes all SPA traffic to the nginx frontend pod. Auth is performed client-side
# by keycloak-js (PKCE/S256); enforceAtGateway stays false. The operator
# provisions only the public SPA client — the oauth2-proxy confidential client
# is no longer needed and is not provisioned.
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-landing.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  hostname: {{ $host | quote }}

  service:
    name: {{ include "nebari-landing.fullname" . }}-frontend
    port: {{ .Values.frontend.service.port }}

  routing:
    routes:
      - pathPrefix: /
        pathType: PathPrefix
    tls:
      enabled: {{ .Values.httpRoute.tls }}

  # Auth is enforced in-process by keycloak-js (PKCE) in the browser and by the
  # webapi's JWT validator. No gateway SecurityPolicy is needed.
  # The operator provisions only the public SPA client (PKCE, no secret).
  # The groups mapper ensures access tokens carry group claims so the webapi can
  # filter services by visibility and group membership.
  auth:
    enabled: true
    enforceAtGateway: false
    # The landing page webapi filters services by group visibility. Without the
    # groups scope and mapper, tokens lack group claims and all group-restricted
    # services are silently hidden from the landing page.
    scopes:
      - openid
      - profile
      - email
      - groups
    keycloakConfig:
      protocolMappers:
        - name: group-membership
          protocolMapper: oidc-group-membership-mapper
          config:
            claim.name: groups
            full.path: "false"
            id.token.claim: "true"
            access.token.claim: "true"
            userinfo.token.claim: "true"
    # Public Keycloak client for the React SPA (keycloak-js PKCE flow).
    # Public clients carry no secret and use PKCE instead, which is the
    # OAuth 2.0 BCP recommendation for browser-based apps.
    # The client ID defaults to <namespace>-<name>-spa and is written
    # to <name>-oidc-spa-client ConfigMap.
    spaClient:
      enabled: {{ .Values.nebariApp.spaClient.enabled }}
      {{- if .Values.nebariApp.spaClient.clientId }}
      clientId: {{ .Values.nebariApp.spaClient.clientId | quote }}
      {{- end }}

  landingPage:
    enabled: {{ .Values.nebariApp.landingPage.enabled }}
    displayName: {{ .Values.nebariApp.landingPage.displayName | quote }}
    description: {{ .Values.nebariApp.landingPage.description | quote }}
    icon: {{ .Values.nebariApp.landingPage.icon | quote }}
    category: {{ .Values.nebariApp.landingPage.category | quote }}
    priority: {{ .Values.nebariApp.landingPage.priority }}
{{- end }}
---
# NOTE: The webapi does not need a NebariApp resource.
#
# The webapi is accessed exclusively via internal Kubernetes DNS
# (nebari-landing-webapi.nebari-system.svc.cluster.local) from the nginx
# proxy running in the frontend pod. It does not require external routing,
# TLS certificates, or OIDC client credentials.
#
# Only the frontend NebariApp creates:
#   - HTTPRoutes for external access (/, /oauth2/)
#   - OIDC client secret (used by oauth2-proxy sidecar)
#   - Optional Gateway SecurityPolicy
#
# The webapi only needs:
#   - Deployment (to run pods)
#   - Service (for cluster-internal DNS)
#   - ServiceAccount + RBAC (to watch NebariApp CRs)
